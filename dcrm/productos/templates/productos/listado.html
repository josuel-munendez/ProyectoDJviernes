{% extends 'base.html' %}
{% block content %}
<h1>Productos</h1>
<a href="{% url 'productos:crear' %}" class="btn btn-primary mb-3">Nuevo Producto</a>
<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.codigo }}</td>
            <td>{{ p.nombre }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <a href="{% url 'productos:detalle' p.id %}" class="btn btn-sm btn-info">Ver</a>
                <a href="{% url 'productos:editar' p.id %}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{% url 'productos:eliminar' p.id %}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="text-center">No hay productos</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
