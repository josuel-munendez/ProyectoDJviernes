{% extends 'base.html' %}
{% block content %}
<h1>Productos</h1>
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <a href="{% url 'productos:crear' %}" class="btn btn-primary">Nuevo Producto</a>
</div>
<div class="table-responsive">
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.codigo }}</td>
            <td>{{ p.nombre }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <a href="{% url 'productos:detalle' p.id %}" class="btn btn-sm btn-info">Ver</a>
                <a href="{% url 'productos:editar' p.id %}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{% url 'productos:eliminar' p.id %}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="text-center">No hay productos</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
