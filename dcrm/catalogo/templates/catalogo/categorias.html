<!-- Pagina de listado de categorias del catalogo. Extiende base.html. -->
{% extends 'base.html' %}
{% block content %}

<div class="animate-fade-in">
    <div class="section-title">
        <div>
            <h3><i class="bi bi-tags me-2"></i>Categorías</h3>
            <p class="subtitle">Listado de categorías del catálogo</p>
        </div>
    </div>

    {% if categorias %}
    <!-- Tarjetas de categorias -->
    <div class="row g-3 animate-slide-in">
        {% for c in categorias %}
        <div class="col-md-4 col-lg-3">
            <div class="card-crm h-100">
                <div class="card-body text-center">
                    <i class="bi bi-tag fs-1 text-primary"></i>
                    <h6 class="mt-2 mb-0">{{ c.nombre }}</h6>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty-state">
        <div class="empty-icon"><i class="bi bi-tags"></i></div>
        <h5>No hay categorías</h5>
        <p class="text-muted">Aún no se han registrado categorías.</p>
    </div>
    {% endif %}
</div>

{% endblock %}
