<!-- Formulario para editar el perfil del usuario (telefono y direccion). Extiende base.html. -->
{% extends 'base.html' %}
{% block content %}

<div class="animate-fade-in">
    <div class="section-title">
        <div>
            <h3><i class="bi bi-pencil-square me-2"></i>Editar Perfil</h3>
            <p class="subtitle">Actualiza tu información personal</p>
        </div>
        <a href="{% url 'perfil' %}" class="btn btn-crm btn-crm-outline">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <!-- Formulario de edicion de perfil -->
    <div class="card-crm">
        <div class="card-header">
            <i class="bi bi-person me-1"></i>Datos Personales
        </div>
        <div class="card-body">
            <form method="post" class="form-crm">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-telephone me-1"></i>Teléfono</label>
                    <input type="text" name="telefono" class="form-control" value="{{ profile.telefono|default:'' }}" placeholder="Ingresa tu teléfono">
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-geo-alt me-1"></i>Dirección</label>
                    <input type="text" name="direccion" class="form-control" value="{{ profile.direccion|default:'' }}" placeholder="Ingresa tu dirección">
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-crm btn-crm-success">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                    <a href="{% url 'perfil' %}" class="btn btn-crm btn-crm-outline">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
