<!-- Pagina de error 403 - Acceso denegado. Extiende base.html. -->
{% extends 'base.html' %}
{% block title %}Acceso denegado - Django CRM{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <!-- Mensaje de error 403 -->
    <div class="text-center animate-fade-in">
        <div class="display-1 fw-bold text-danger mb-3">403</div>
        <div class="display-6 text-muted mb-3"><i class="bi bi-shield-exclamation"></i> Acceso denegado</div>
        <p class="text-secondary mb-4">No tienes permisos para acceder a esta página.</p>
        <a href="{% url 'home' %}" class="btn btn-crm btn-crm-primary btn-lg">
            <i class="bi bi-house me-1"></i> Volver al inicio
        </a>
    </div>
</div>
{% endblock %}
