<!-- Formulario para cambiar la contrasena del usuario autenticado. Extiende base.html. -->
{% extends 'base.html' %}
{% block content %}

<div class="animate-fade-in">
    <div class="section-title">
        <div>
            <h3><i class="bi bi-key me-2"></i>Cambiar Contraseña</h3>
            <p class="subtitle">Actualiza tu contraseña de acceso</p>
        </div>
    </div>

    <!-- Formulario para cambiar contrasena -->
    <div class="card-crm" style="max-width: 600px;">
        <div class="card-header">
            <i class="bi bi-lock me-1"></i>Nueva Contraseña
        </div>
        <div class="card-body">
            <form method="post" class="form-crm">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">
                        {% if field.name == 'old_password' %}<i class="bi bi-lock me-1"></i>
                        {% elif field.name == 'new_password1' %}<i class="bi bi-key me-1"></i>
                        {% elif field.name == 'new_password2' %}<i class="bi bi-key-fill me-1"></i>
                        {% endif %}
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.help_text %}
                    <div class="form-text">{{ field.help_text|safe }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-crm btn-crm-primary">
                        <i class="bi bi-check-lg me-1"></i>Cambiar
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-crm btn-crm-outline">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
