{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">Panel de Administración</h1>
<div class="row mt-4 g-3">
    <div class="col-6 col-md-6 col-lg-3 dashboard-card">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body text-center">
                <h5 class="card-title display-6">{{ total_usuarios }}</h5>
                <p class="card-text">Usuarios</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-6 col-lg-3 dashboard-card">
        <div class="card text-white bg-success mb-3">
            <div class="card-body text-center">
                <h5 class="card-title display-6">{{ total_clientes }}</h5>
                <p class="card-text">Clientes</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-6 col-lg-3 dashboard-card">
        <div class="card text-white bg-info mb-3">
            <div class="card-body text-center">
                <h5 class="card-title display-6">{{ total_productos }}</h5>
                <p class="card-text">Productos</p>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-6 col-lg-3 dashboard-card">
        <div class="card text-white bg-warning mb-3">
            <div class="card-body text-center">
                <h5 class="card-title display-6">{{ total_categorias }}</h5>
                <p class="card-text">Categorías</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
