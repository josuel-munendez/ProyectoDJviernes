{% extends 'base.html' %}
{% block content %}
<h1>Usuarios del Sistema</h1>
<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Staff</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.first_name }} {{ u.last_name }}</td>
            <td>{{ u.profile.get_rol_display }}</td>
            <td>{{ u.is_staff|yesno:"Sí,No" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
