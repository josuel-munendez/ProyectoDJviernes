{% extends 'base.html' %}
{% block content %}

<div class="animate-fade-in">
    <div class="section-title">
        <div>
            <h3><i class="bi bi-pencil-square me-2"></i>Actualizar Registro</h3>
            <p class="subtitle">Modifica los datos del registro</p>
        </div>
        <a href="{% url 'home' %}" class="btn btn-crm btn-crm-outline">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <div class="card-crm">
        <div class="card-header">
            <i class="bi bi-pencil me-1"></i>Editar Registro
        </div>
        <div class="card-body">
            <form method="post" action="" class="form-crm">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-crm btn-crm-primary">
                        <i class="bi bi-check-lg me-1"></i>Actualizar
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-crm btn-crm-outline">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
