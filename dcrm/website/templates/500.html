<!-- Pagina de error 500 - Error interno del servidor. Extiende base.html. -->
{% extends 'base.html' %}
{% block title %}Error del servidor - Django CRM{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <!-- Mensaje de error 500 -->
    <div class="text-center animate-fade-in">
        <div class="display-1 fw-bold text-warning mb-3">500</div>
        <div class="display-6 text-muted mb-3"><i class="bi bi-exclamation-triangle"></i> Error del servidor</div>
        <p class="text-secondary mb-4">Ocurrió un error interno. Por favor intenta más tarde.</p>
        <a href="{% url 'home' %}" class="btn btn-crm btn-crm-primary btn-lg">
            <i class="bi bi-house me-1"></i> Volver al inicio
        </a>
    </div>
</div>
{% endblock %}
